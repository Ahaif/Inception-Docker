server {
    listen 443 ssl http2;
    server_name _;

    # WordPress files are mounted from the shared www_data volume.
    root  /var/www/html;
    index index.php index.html;

    ssl_certificate     /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;
    # Disable deprecated TLS versions (1.0 and 1.1 are exploitable).
    ssl_protocols TLSv1.2 TLSv1.3;

    # Try to serve the request as a static file first; fall back to index.php.
    # This is required for WordPress permalinks to work.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Forward PHP requests to the WordPress container via FastCGI.
    # "wordpress" resolves to the wordpress container via Docker's internal DNS.
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass            wordpress:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
    }

    # Block access to hidden files (e.g. .htaccess, .env).
    location ~ /\. {
        deny all;
    }
}
