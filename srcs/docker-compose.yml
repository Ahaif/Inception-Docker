
secrets:
  mysql_root_password:
    file: ${SECRETS_DIR}/mysql_root_password
  mysql_password:
    file: ${SECRETS_DIR}/mysql_password
  wp_admin_password:
    file: ${SECRETS_DIR}/wp_admin_password

services:
  mariadb:
    image: mariadb
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    secrets:
      - mysql_root_password
      - mysql_password
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception_net

  wordpress:
    image: wordpress
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      - mariadb
    secrets:
      - mysql_password
      - wp_admin_password
    environment:
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_NAME=${MYSQL_DATABASE}
      - WORDPRESS_DB_USER=${MYSQL_USER}
      - DOMAIN_NAME=${DOMAIN_NAME}
      - WP_ADMIN_USER=${WP_ADMIN_USER}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL}
    volumes:
      - www_data:/var/www/html
    networks:
      - inception_net

  nginx:
    image: nginx
    build: ./requirements/nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - www_data:/var/www/html:ro
    networks:
      - inception_net

networks:
  inception_net:
    driver: bridge

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_DATA}/db
  www_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOST_DATA}/www
